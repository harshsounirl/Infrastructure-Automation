---
# tasks/password_policy.yml - Configure password policies

- name: Set minimum password length
  ansible.windows.win_security_policy:
    section: System Access
    key: MinimumPasswordLength
    value: "{{ win_hardening_password_min_length }}"

- name: Set maximum password age
  ansible.windows.win_security_policy:
    section: System Access
    key: MaximumPasswordAge
    value: "{{ win_hardening_password_max_age }}"

- name: Set minimum password age
  ansible.windows.win_security_policy:
    section: System Access
    key: MinimumPasswordAge
    value: "{{ win_hardening_password_min_age }}"

- name: Set password history length
  ansible.windows.win_security_policy:
    section: System Access
    key: PasswordHistorySize
    value: "{{ win_hardening_password_history }}"

- name: Enable password complexity requirements
  ansible.windows.win_security_policy:
    section: System Access
    key: PasswordComplexity
    value: "{{ '1' if win_hardening_password_complexity_enabled else '0' }}"
