---
# tasks/account_lockout.yml - Configure account lockout policies

- name: Set account lockout threshold
  ansible.windows.win_security_policy:
    section: System Access
    key: LockoutBadCount
    value: "{{ win_hardening_lockout_threshold }}"

- name: Set account lockout duration (minutes)
  ansible.windows.win_security_policy:
    section: System Access
    key: LockoutDuration
    value: "{{ win_hardening_lockout_duration }}"

- name: Set lockout observation window (minutes)
  ansible.windows.win_security_policy:
    section: System Access
    key: ResetLockoutCount
    value: "{{ win_hardening_lockout_reset_counter }}"
