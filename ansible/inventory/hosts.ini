# ─────────────────────────────────────────────
#  Inventory – RHEL Web / App Servers
# ─────────────────────────────────────────────

# ── Local Docker target (laptop testing) ──────
[docker_local]
rhel-target ansible_host=127.0.0.1 ansible_port=2222 ansible_user=ansible

# ── Development environment ───────────────────
[dev]
dev-rhel-01 ansible_host=10.0.1.10 ansible_user=ansible

# ── Production environment ────────────────────
[prod]
prod-rhel-01 ansible_host=10.0.2.10 ansible_user=ansible
prod-rhel-02 ansible_host=10.0.2.11 ansible_user=ansible

# ── Group of all RHEL servers ─────────────────
[rhel_servers:children]
docker_local
dev
prod

# ── Variables applied to every RHEL server ────
[rhel_servers:vars]
ansible_become=true
ansible_become_method=sudo
ansible_python_interpreter=/usr/bin/python3
